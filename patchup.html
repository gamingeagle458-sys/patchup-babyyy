<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patchup Babyy 鉂わ笍</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e0,#ff9eb5);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:750px;
}

.card{
    background:white;
    padding:50px 30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
}

.message{
    font-size:32px;
    color:#ff4f7b;
    line-height:1.8;
    min-height:140px;
    animation:fade 0.5s ease;
}

.buttons{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:16px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:20px;
    transition:0.3s;
    color:white;
}

.yesBtn{
    background:#ff4f7b;
}

.noBtn{
    background:#ff8fab;
}

button:hover{
    transform:scale(1.08);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    font-size:25px;
    color:#ff4f7b;
    animation:float 5s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0);
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="message" id="message">
            Click Start 馃槉
        </div>

        <div class="buttons" id="buttons">
            <button class="yesBtn" onclick="nextStep()">
                Start 鉂わ笍
            </button>
        </div>

    </div>
</div>

<script>

let step = 0;
let noSize = 1;

const scenes = [

{
msg:"Heyy...馃槶鉂わ笍",
buttons:[
{text:"Next馃槉",action:"next"}
]
},

{
msg:"I know I hurt U...and I am really really sorry馃槶馃檹馃徎",
buttons:[
{text:"Its Okayy 馃槉",action:"next"},
{text:"Still Angry馃槨",action:"shrink"}
],
shrinkMsg:"Please don鈥檛 stay angry馃槶鉂わ笍"
},

{
msg:"U mean so much to me...more than U even know鉂わ笍",
buttons:[
{text:"Aww 馃槉",action:"next"}
]
},

{
msg:"I miss U...our talks...our laughs...our silly moments鉂わ笍",
buttons:[
{text:"Me Too鉂わ笍",action:"next"},
{text:"Nahh馃槶",action:"shrink"}
],
shrinkMsg:"But I really miss U so much馃槶鉂わ笍"
},

{
msg:"Can we fix this together...?鉂わ笍",
buttons:[
{text:"Okayy 鉂わ笍",action:"next"},
{text:"Nahh 馃槶",action:"shrink"}
],
shrinkMsg:"Pleaseee...just one more chance馃槶馃檹馃徎"
},

{
msg:"I promise I will listen more...understand U more...and never ignore Ur feelings again鉂わ笍",
buttons:[
{text:"Promise...?馃槉",action:"next"}
]
},

{
msg:"Lets patchup babyy鉂わ笍",
buttons:[
{text:"Lala鉂わ笍",action:"next"},
{text:"Never馃槶",action:"shrink"}
],
shrinkMsg:"Please babyyy馃槶馃檹馃徎鉂わ笍"
},

{
msg:"I still choose U...again and again...every single day馃槉鉂わ笍",
buttons:[
{text:"MY BABY馃槉",action:"next"}
]
},

{
msg:"No matter what happens...my heart always finds U鉂わ笍",
buttons:[
{text:"Awww鉂わ笍",action:"next"}
]
},

{
msg:"l love youuu鉂わ笍",
buttons:[
{text:"I Lovee Youu Too鉂わ笍",action:"next"}
]
},

{
msg:"umaaaaaaaaaaaaaaa馃拫",
buttons:[
{text:"ummmaaaaaaaaa馃拫",action:"next"}
]
},

{
msg:"Forever Together鉂わ笍馃尮馃槉",
buttons:[
{text:"Again鉂わ笍",action:"restart"}
]
}

];

function nextStep(){

    if(step >= scenes.length){
        step = 0;
    }

    const scene = scenes[step];

    document.getElementById("message").innerHTML = scene.msg;

    const buttonsDiv = document.getElementById("buttons");

    buttonsDiv.innerHTML = "";

    noSize = 1;

    scene.buttons.forEach(btn=>{

        const button = document.createElement("button");

        button.innerHTML = btn.text;

        if(btn.action === "shrink"){
            button.className = "noBtn";

            button.onclick = ()=>{
                noSize -= 0.15;

                if(noSize < 0.35){
                    noSize = 0.35;
                }

                button.style.transform = `scale(${noSize})`;

                document.getElementById("message").innerHTML =
                scene.shrinkMsg;
            };
        }

        else if(btn.action === "restart"){
            button.className = "yesBtn";

            button.onclick = ()=>{
                step = 0;
                nextStep();
            };
        }

        else{
            button.className = "yesBtn";

            button.onclick = ()=>{
                step++;
                nextStep();
            };
        }

        buttonsDiv.appendChild(button);

    });

}

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "鉂わ笍";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize = (Math.random()*20 + 15) + "px";

    heart.style.animationDuration = (Math.random()*3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
